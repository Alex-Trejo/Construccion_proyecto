# Configuración de análisis estático (SonarQube / SonarCloud).
sonar.projectKey=sgc-monorepo
sonar.projectName=SGC - Sistema de Gestion de Comprobantes
sonar.sources=apps,packages
sonar.sourceEncoding=UTF-8

# Excluir artefactos y dependencias del análisis.
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/coverage/**,**/*.config.*,**/migrations/**
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts

# Si usas SonarCloud (SaaS), descomenta y ajusta:
# sonar.organization=tu-organizacion
