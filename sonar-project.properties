# Configuración de análisis estático (SonarCloud).
sonar.projectKey=Alex-Trejo_Construccion_proyecto
sonar.organization=alex-trejo
sonar.projectName=SGC - Sistema de Gestion de Comprobantes
sonar.sources=apps,packages
sonar.sourceEncoding=UTF-8

# Excluir artefactos y dependencias del análisis.
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/coverage/**,**/*.config.*,**/migrations/**,**/loki-logger.ts,**/Dockerfile
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts
sonar.javascript.lcov.reportPaths=**/coverage/lcov.info
sonar.coverage.exclusions=apps/frontend/**,**/*.module.ts,**/*.dto.ts,**/main.ts,**/database/**
