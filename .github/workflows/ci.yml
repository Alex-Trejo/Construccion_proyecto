name: CI

# Integración Continua: compila el monorepo, corre lint/test, análisis de
# calidad (SonarQube self-hosted), escaneo de seguridad (Trivy) y notifica a
# Telegram. Se dispara en push/PR a las ramas principales.

on:
  push:
    branches: [main, develop, qa]
  pull_request:
    branches: [main, develop, qa]

jobs:
  # ── Build + Lint + Test ──────────────────────────────────────────────────
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    # Placeholders de build: el `next build` ejecuta el Fail-Fast (serverEnv).
    # NO son secretos reales; los valores reales se inyectan en runtime.
    env:
      NEXTAUTH_URL: http://localhost:3005
      NEXTAUTH_SECRET: ci-build-placeholder
      KEYCLOAK_CLIENT_ID: sgc-frontend
      KEYCLOAK_CLIENT_SECRET: ci-build-placeholder
      KEYCLOAK_ISSUER: http://localhost:8080/realms/sgc-realm
      NEXT_PUBLIC_API_GATEWAY_URL: http://localhost:3000/api/v1
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.4.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Compilar (turbo build)
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Tests
        run: pnpm test:cov

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: apps/*/coverage/lcov.info
          retention-days: 1

  # ── Análisis de calidad — SonarQube / SonarCloud (externo) ───────────────
  # Se ejecuta contra un Sonar EXTERNO (SonarCloud o tu servidor SonarQube)
  # configurado por secrets. Si no hay SONAR_TOKEN, el análisis se OMITE
  # limpiamente (check en verde) en vez de fallar.
  quality:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: build-test
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      # SonarCloud: https://sonarcloud.io | SonarQube propio: https://tu-sonar
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Sonar necesita el historial para blame

      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: .

      - name: Análisis Sonar
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: sonarsource/sonarqube-scan-action@v3
        # SONAR_TOKEN y SONAR_HOST_URL ya están en el env del job.

      - name: Sonar omitido (sin SONAR_TOKEN)
        if: ${{ env.SONAR_TOKEN == '' }}
        run: |
          echo "::notice::Análisis Sonar omitido: configura SONAR_TOKEN (y SONAR_HOST_URL si usas SonarQube propio) en los Secrets para habilitarlo."

  # ── Escaneo de seguridad — Trivy (filesystem) ────────────────────────────
  security:
    name: Trivy
    runs-on: ubuntu-latest
    continue-on-error: true # reporta pero no bloquea el pipeline
    steps:
      - uses: actions/checkout@v4

      - name: Escaneo de vulnerabilidades (FS)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0' # reporta pero no bloquea

  # ── Notificación a Telegram ──────────────────────────────────────────────
  notify:
    name: Notificar Telegram
    runs-on: ubuntu-latest
    needs: [build-test, quality, security]
    if: always()
    env:
      TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
      REPO: ${{ github.repository }}
      REF: ${{ github.ref_name }}
      ACTOR: ${{ github.actor }}
      BUILD_RESULT: ${{ needs.build-test.result }}
    steps:
      - name: Enviar mensaje
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then
            echo "Secrets TELEGRAM_* ausentes; se omite la notificación."; exit 0
          fi
          if [ "$BUILD_RESULT" = "success" ]; then ICON="✅"; else ICON="❌"; fi
          MSG=$(printf "%s <b>CI: %s</b>\n<b>Repo:</b> %s\n<b>Rama:</b> %s\n<b>Commit:</b> %s\n<b>Autor:</b> %s" \
            "$ICON" "$BUILD_RESULT" "$REPO" "$REF" "${GITHUB_SHA:0:7}" "$ACTOR")
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" -d parse_mode=HTML -d disable_web_page_preview=true \
            --data-urlencode "text=${MSG}" >/dev/null
          echo "Notificación enviada a Telegram."
