name: CD

# Entrega Continua: construye las imágenes Docker de cada app y las publica
# en GitHub Container Registry (ghcr.io). Se dispara al hacer push a main/qa
# o manualmente. Usa el GITHUB_TOKEN del repo (no requiere secrets extra para GHCR).

on:
  push:
    branches: [main, qa]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build & Push (${{ matrix.app.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - { name: ms-core, dockerfile: apps/ms-core/Dockerfile }
          - { name: ms-sync, dockerfile: apps/ms-sync/Dockerfile }
          - { name: api-gateway, dockerfile: apps/api-gateway/Dockerfile }
          - { name: frontend, dockerfile: apps/frontend/Dockerfile }
    steps:
      - uses: actions/checkout@v4

      - name: Owner en minúsculas (requisito de GHCR)
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push imagen
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.app.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/sgc-${{ matrix.app.name }}:latest
            ghcr.io/${{ env.OWNER_LC }}/sgc-${{ matrix.app.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy a EC2 (pull GHCR)
    runs-on: ubuntu-latest
    needs: build-push
    # Solo despliega en main (qa solo publica imágenes). Si build-push falla,
    # este job NO corre → "sin errores → deploy".
    if: github.ref == 'refs/heads/main'
    steps:
      - name: SSH a la instancia y actualizar el stack
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_USER,GHCR_TOKEN
          script: |
            set -e
            cd /opt/facturlink
            git pull --ff-only || true
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            docker image prune -f
        env:
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

  notify:
    name: Notificar Telegram
    runs-on: ubuntu-latest
    needs: [build-push, deploy]
    if: always()
    env:
      TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
      REPO: ${{ github.repository }}
      REF: ${{ github.ref_name }}
      ACTOR: ${{ github.actor }}
      BUILD_RESULT: ${{ needs.build-push.result }}
      DEPLOY_RESULT: ${{ needs.deploy.result }}
    steps:
      - name: Enviar mensaje
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then
            echo "Secrets TELEGRAM_* ausentes; se omite la notificación."; exit 0
          fi
          if [ "$BUILD_RESULT" != "success" ]; then
            ICON="❌"; TXT="Falló el build/push de imágenes"
          elif [ "$DEPLOY_RESULT" = "success" ]; then
            ICON="🚀"; TXT="Desplegado a producción (EC2)"
          elif [ "$DEPLOY_RESULT" = "failure" ]; then
            ICON="⚠️"; TXT="Imágenes OK, pero falló el deploy a EC2"
          else
            ICON="📦"; TXT="Imágenes publicadas en GHCR"
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG=$(printf "%s <b>CD: %s</b>\n<b>Repo:</b> %s\n<b>Rama:</b> %s\n<b>Commit:</b> %s\n<b>Autor:</b> %s\n<a href=\"%s\">🔍 Ver detalles / logs</a>" \
            "$ICON" "$TXT" "$REPO" "$REF" "${GITHUB_SHA:0:7}" "$ACTOR" "$RUN_URL")
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" -d parse_mode=HTML -d disable_web_page_preview=true \
            --data-urlencode "text=${MSG}" >/dev/null
          echo "Notificación enviada a Telegram."
